<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0f0f1a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Salona Massage</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg: #0f0f1a;
    --surface: #1a1a2e;
    --surface2: #22223b;
    --accent: #c9a96e;
    --accent2: #e8c99a;
    --text: #f0ede8;
    --text-muted: #8a8a9a;
    --danger: #e05c5c;
    --success: #5cb85c;
    --border: rgba(201,169,110,0.15);
    --radius: 16px;
    --radius-sm: 10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    max-width: 480px;
    margin: 0 auto;
    overflow-x: hidden;
  }

  /* ── PIN SCREEN ── */
  #pin-screen {
    position: fixed; inset: 0; background: var(--bg);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 999; gap: 32px;
  }
  #pin-screen h1 { font-family: 'Playfair Display', serif; color: var(--accent); font-size: 28px; }
  #pin-screen p { color: var(--text-muted); font-size: 14px; margin-top: -24px; }
  .pin-dots { display: flex; gap: 16px; }
  .pin-dot {
    width: 14px; height: 14px; border-radius: 50%;
    border: 2px solid var(--accent); background: transparent;
    transition: background 0.15s;
  }
  .pin-dot.filled { background: var(--accent); }
  .pin-pad { display: grid; grid-template-columns: repeat(3, 72px); gap: 14px; }
  .pin-btn {
    width: 72px; height: 72px; border-radius: 50%;
    background: var(--surface); border: 1px solid var(--border);
    color: var(--text); font-size: 22px; font-family: 'DM Sans', sans-serif;
    cursor: pointer; transition: all 0.15s; display: flex;
    align-items: center; justify-content: center;
  }
  .pin-btn:active { background: var(--surface2); transform: scale(0.95); }
  .pin-btn.del { font-size: 18px; color: var(--text-muted); }
  .pin-error { color: var(--danger); font-size: 13px; min-height: 20px; }

  /* ── HEADER ── */
  .header {
    background: var(--surface); padding: 20px 20px 16px;
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 100;
    display: flex; justify-content: space-between; align-items: flex-start;
  }
  .header h1 { font-family: 'Playfair Display', serif; font-size: 22px; color: var(--accent); letter-spacing: 0.05em; }
  .header p { font-size: 11px; color: var(--text-muted); margin-top: 2px; letter-spacing: 0.08em; text-transform: uppercase; }
  .lock-btn { background: none; border: none; color: var(--text-muted); font-size: 18px; cursor: pointer; padding: 4px; }

  /* ── TABS ── */
  .tabs {
    display: flex; background: var(--surface);
    border-bottom: 1px solid var(--border);
    overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none;
  }
  .tabs::-webkit-scrollbar { display: none; }
  .tab {
    flex: 1; min-width: 70px; padding: 12px 6px;
    background: none; border: none; color: var(--text-muted);
    font-family: 'DM Sans', sans-serif; font-size: 11px;
    letter-spacing: 0.06em; text-transform: uppercase; cursor: pointer;
    transition: all 0.2s; border-bottom: 2px solid transparent;
    display: flex; flex-direction: column; align-items: center; gap: 4px;
  }
  .tab .tab-icon { font-size: 16px; }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  /* ── CONTENT ── */
  .content { padding: 20px 16px 100px; }
  .page { display: none; }
  .page.active { display: block; }

  /* ── CARDS ── */
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 12px; }
  .card-title { font-size: 10px; text-transform: uppercase; letter-spacing: 0.12em; color: var(--text-muted); margin-bottom: 8px; }
  .card-value { font-size: 28px; font-family: 'Playfair Display', serif; color: var(--accent); }
  .card-sub { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
  .stats-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
  .stats-row .card { margin-bottom: 0; }

  /* ── SECTION ── */
  .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
  .section-title { font-size: 12px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted); }

  /* ── BUTTONS ── */
  .btn { background: var(--accent); color: #1a1a2e; border: none; border-radius: var(--radius-sm); padding: 10px 18px; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.2s; }
  .btn:hover { background: var(--accent2); }
  .btn-sm { padding: 6px 12px; font-size: 12px; }
  .btn-ghost { background: transparent; color: var(--accent); border: 1px solid var(--border); }
  .btn-ghost:hover { background: rgba(201,169,110,0.1); }
  .btn-danger { background: var(--danger); color: white; }
  .btn-success { background: var(--success); color: white; }

  /* ── MODAL ── */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 200; display: none; align-items: flex-end; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--surface2); border-radius: 24px 24px 0 0; padding: 24px 20px 40px; width: 100%; max-height: 90vh; overflow-y: auto; animation: slideUp 0.3s ease; }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  .modal-handle { width: 40px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 20px; }
  .modal h2 { font-family: 'Playfair Display', serif; font-size: 20px; color: var(--accent); margin-bottom: 20px; }

  /* ── FORM ── */
  .form-group { margin-bottom: 16px; }
  label { display: block; font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted); margin-bottom: 6px; }
  input, select, textarea { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px 14px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px; outline: none; transition: border-color 0.2s; }
  input:focus, select:focus, textarea:focus { border-color: var(--accent); }
  select option { background: var(--surface2); }
  textarea { resize: none; height: 80px; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  /* ── TREATMENT ITEM ── */
  .treatment-item { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 14px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; }
  .treatment-item.unpaid { border-left: 3px solid var(--danger); }
  .treatment-item.paid { border-left: 3px solid var(--success); }
  .treatment-info { flex: 1; }
  .treatment-name { font-size: 15px; font-weight: 500; }
  .treatment-type { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
  .treatment-date { font-size: 11px; color: var(--text-muted); margin-top: 4px; }
  .treatment-meta { text-align: right; display: flex; flex-direction: column; align-items: flex-end; gap: 6px; }
  .treatment-price { font-family: 'Playfair Display', serif; font-size: 18px; color: var(--accent); }
  .badge { font-size: 10px; padding: 3px 8px; border-radius: 20px; letter-spacing: 0.05em; font-weight: 500; }
  .badge-unpaid { background: rgba(224,92,92,0.2); color: var(--danger); }
  .badge-paid { background: rgba(92,184,92,0.2); color: var(--success); }
  .badge-payment { background: rgba(201,169,110,0.15); color: var(--accent); }
  .action-row { display: flex; gap: 8px; margin-top: 8px; }
  .note-text { font-size: 12px; color: var(--text-muted); font-style: italic; margin-top: 4px; }

  /* ── CUSTOMER ── */
  .customer-item { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 14px; margin-bottom: 10px; cursor: pointer; transition: border-color 0.2s; }
  .customer-item:hover { border-color: var(--accent); }
  .customer-name { font-size: 15px; font-weight: 500; }
  .customer-stats { display: flex; gap: 16px; margin-top: 6px; flex-wrap: wrap; }
  .customer-stat { font-size: 12px; color: var(--text-muted); }
  .customer-stat span { color: var(--accent); font-weight: 500; }
  .customer-visit { background: var(--bg); border-radius: var(--radius-sm); padding: 12px; margin-bottom: 8px; display: flex; justify-content: space-between; }

  /* ── EXPENSE ── */
  .expense-item { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 14px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
  .expense-desc { font-size: 14px; }
  .expense-meta { font-size: 12px; color: var(--text-muted); margin-top: 3px; }
  .expense-amount { font-family: 'Playfair Display', serif; font-size: 18px; color: var(--danger); }

  /* ── MONTH ── */
  .month-selector { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 10px 14px; }
  .month-selector button { background: none; border: none; color: var(--accent); font-size: 18px; cursor: pointer; padding: 0 6px; }
  .month-selector span { flex: 1; text-align: center; font-size: 14px; font-weight: 500; }

  /* ── MISC ── */
  .loading { text-align: center; padding: 40px; color: var(--text-muted); font-size: 14px; }
  .spinner { display: inline-block; width: 24px; height: 24px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 10px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .fab { position: fixed; bottom: 24px; right: 20px; width: 56px; height: 56px; border-radius: 50%; background: var(--accent); border: none; color: #1a1a2e; font-size: 24px; cursor: pointer; box-shadow: 0 4px 20px rgba(201,169,110,0.4); z-index: 100; transition: all 0.2s; display: flex; align-items: center; justify-content: center; }
  .fab:hover { transform: scale(1.05); background: var(--accent2); }
  .toast { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%); background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 10px 20px; border-radius: 24px; font-size: 13px; z-index: 300; opacity: 0; transition: opacity 0.3s; white-space: nowrap; }
  .toast.show { opacity: 1; }
  .profit-positive { color: var(--success) !important; }
  .profit-negative { color: var(--danger) !important; }
  .empty { text-align: center; padding: 40px 20px; color: var(--text-muted); }
  .empty .empty-icon { font-size: 40px; margin-bottom: 12px; }
  .empty p { font-size: 14px; }
  .export-btn { display: flex; align-items: center; gap: 6px; }
</style>
</head>

<script>
// ── CONFIG ──────────────────────────────────────────────────────
const SUPABASE_URL = 'https://oeqmdiqrgfglywepatkq.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9lcW1kaXFyZ2ZnbHl3ZXBhdGtxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1ODM1MjQsImV4cCI6MjA4OTE1OTUyNH0.WHY-mJ7NGXkI9To32mLQ-3fTbg7dXRTKG6KIlZcw4V8';
const CORRECT_PIN = '1234'; // ← Ändra till din PIN

const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY);

// ── PIN ──────────────────────────────────────────────────────────
let pinBuffer = '';

function pinPress(digit) {
  if (pinBuffer.length >= 4) return;
  pinBuffer += digit;
  updatePinDots();
  if (pinBuffer.length === 4) {
    setTimeout(checkPin, 150);
  }
}
function pinDel() {
  pinBuffer = pinBuffer.slice(0, -1);
  updatePinDots();
  document.getElementById('pin-error').textContent = '';
}
function updatePinDots() {
  for (let i = 0; i < 4; i++) {
    document.getElementById('d' + i).classList.toggle('filled', i < pinBuffer.length);
  }
}
function checkPin() {
  if (pinBuffer === CORRECT_PIN) {
    document.getElementById('pin-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    initApp();
  } else {
    document.getElementById('pin-error').textContent = 'Fel PIN-kod, försök igen';
    pinBuffer = '';
    updatePinDots();
  }
}
function lockApp() {
  pinBuffer = '';
  updatePinDots();
  document.getElementById('pin-error').textContent = '';
  document.getElementById('app').style.display = 'none';
  document.getElementById('pin-screen').style.display = 'flex';
}

// ── STATE ────────────────────────────────────────────────────────
let currentPage = 'overview';
let currentMonth = new Date();
let allTreatments = [];
let allExpenses = [];
let appInited = false;

// ── INIT ─────────────────────────────────────────────────────────
async function initApp() {
  if (appInited) return;
  appInited = true;
  setDefaultDates();
  updateMonthDisplay();
  await loadAll();
  setupRealtime();
}

async function loadAll() {
  try {
    const [t, e] = await Promise.all([
      db.from('treatments').select('*').order('date', { ascending: false }),
      db.from('expenses').select('*').order('date', { ascending: false })
    ]);
    allTreatments = t.data || [];
    allExpenses = e.data || [];
    document.getElementById('sync-status').textContent = 'Synkroniserad ✓';
    renderAll();
    updateCustomerSuggestions();
  } catch (err) {
    document.getElementById('sync-status').textContent = 'Offline';
  }
}

function setupRealtime() {
  db.channel('realtime').on('postgres_changes', { event: '*', schema: 'public', table: 'treatments' }, loadAll)
    .on('postgres_changes', { event: '*', schema: 'public', table: 'expenses' }, loadAll).subscribe();
}

function renderAll() {
  renderOverview();
  renderTreatments();
  renderCustomers();
  renderExpenses();
}

// ── MONTH ─────────────────────────────────────────────────────────
function changeMonth(dir) {
  currentMonth = new Date(currentMonth.getFullYear(), currentMonth.getMonth() + dir, 1);
  updateMonthDisplay();
  renderOverview();
}
function updateMonthDisplay() {
  const months = ['Januari','Februari','Mars','April','Maj','Juni','Juli','Augusti','September','Oktober','November','December'];
  document.getElementById('month-display').textContent = `${months[currentMonth.getMonth()]} ${currentMonth.getFullYear()}`;
}
function inCurrentMonth(d) {
  const dt = new Date(d);
  return dt.getMonth() === currentMonth.getMonth() && dt.getFullYear() === currentMonth.getFullYear();
}

// ── OVERVIEW ──────────────────────────────────────────────────────
function renderOverview() {
  const monthT = allTreatments.filter(t => inCurrentMonth(t.date) && t.status === 'paid');
  const monthE = allExpenses.filter(e => inCurrentMonth(e.date));
  const revenue = monthT.reduce((s,t) => s + Number(t.price), 0);
  const expenses = monthE.reduce((s,e) => s + Number(e.amount), 0);
  const profit = revenue - expenses;

  document.getElementById('stat-revenue').textContent = fmtKr(revenue);
  document.getElementById('stat-revenue-count').textContent = `${monthT.length} behandlingar`;
  document.getElementById('stat-expenses').textContent = fmtKr(expenses);
  document.getElementById('stat-expenses-count').textContent = `${monthE.length} poster`;
  const profitEl = document.getElementById('stat-profit');
  profitEl.textContent = fmtKr(profit);
  profitEl.className = 'card-value ' + (profit >= 0 ? 'profit-positive' : 'profit-negative');
  document.getElementById('stat-profit-margin').textContent = revenue > 0 ? `${Math.round((profit/revenue)*100)}% marginal` : 'Inga intäkter ännu';

  const unpaid = allTreatments.filter(t => t.status === 'unpaid');
  const unpaidEl = document.getElementById('unpaid-list');
  unpaidEl.innerHTML = unpaid.length === 0
    ? `<div class="empty"><div class="empty-icon">✅</div><p>Alla är betalda!</p></div>`
    : unpaid.map(t => treatmentHTML(t)).join('');
}

// ── TREATMENTS ────────────────────────────────────────────────────
function renderTreatments() {
  const el = document.getElementById('treatments-list');
  el.innerHTML = allTreatments.length === 0
    ? `<div class="empty"><div class="empty-icon">💆</div><p>Inga behandlingar ännu</p></div>`
    : allTreatments.map(t => treatmentHTML(t)).join('');
}

function treatmentHTML(t) {
  const paid = t.status === 'paid';
  return `<div class="treatment-item ${paid ? 'paid' : 'unpaid'}">
    <div class="treatment-info">
      <div class="treatment-name">${t.customer_name}</div>
      <div class="treatment-type">${t.treatment_type}</div>
      ${t.note ? `<div class="note-text">${t.note}</div>` : ''}
      <div class="treatment-date">${fmtDate(t.date)}</div>
      <div class="action-row">
        ${!paid ? `<button class="btn btn-sm btn-success" onclick="markPaid('${t.id}',event)">Markera betald</button>` : ''}
        <button class="btn btn-sm btn-ghost" onclick="deleteTreatment('${t.id}',event)" style="color:var(--danger);border-color:rgba(224,92,92,0.3)">✕</button>
      </div>
    </div>
    <div class="treatment-meta">
      <div class="treatment-price">${fmtKr(t.price)}</div>
      <span class="badge ${paid ? 'badge-paid' : 'badge-unpaid'}">${paid ? 'Betald' : 'Obetald'}</span>
      ${t.payment_method ? `<span class="badge badge-payment">${t.payment_method}</span>` : ''}
    </div>
  </div>`;
}

// ── CUSTOMERS ─────────────────────────────────────────────────────
function renderCustomers() {
  const el = document.getElementById('customers-list');
  const map = {};
  allTreatments.forEach(t => {
    if (!map[t.customer_name]) map[t.customer_name] = { visits: [], phone: t.customer_phone || '' };
    map[t.customer_name].visits.push(t);
    if (t.customer_phone) map[t.customer_name].phone = t.customer_phone;
  });
  const list = Object.entries(map).sort((a,b) => b[1].visits.length - a[1].visits.length);
  if (!list.length) { el.innerHTML = `<div class="empty"><div class="empty-icon">👤</div><p>Inga kunder ännu</p></div>`; return; }
  el.innerHTML = list.map(([name, data]) => {
    const total = data.visits.reduce((s,v) => s + Number(v.price), 0);
    return `<div class="customer-item" onclick="showCustomer('${name}')">
      <div class="customer-name">${name}</div>
      <div class="customer-stats">
        <div class="customer-stat"><span>${data.visits.length}</span> besök</div>
        <div class="customer-stat"><span>${fmtKr(total)}</span> totalt</div>
        ${data.phone ? `<div class="customer-stat">📞 <span>${data.phone}</span></div>` : ''}
      </div>
    </div>`;
  }).join('');
}

function showCustomer(name) {
  const visits = allTreatments.filter(t => t.customer_name === name);
  const total = visits.reduce((s,v) => s + Number(v.price), 0);
  const phone = visits.find(v => v.customer_phone)?.customer_phone || '';
  document.getElementById('customer-modal-name').textContent = name;
  document.getElementById('customer-modal-body').innerHTML = `
    <div style="margin-bottom:16px">
      <span style="font-size:13px;color:var(--text-muted)">${visits.length} besök · ${fmtKr(total)} totalt</span>
      ${phone ? `<br><a href="tel:${phone}" style="color:var(--accent);font-size:13px;text-decoration:none">📞 ${phone}</a>` : ''}
    </div>
    ${visits.map(v => `<div class="customer-visit">
      <div>
        <div style="font-size:14px">${v.treatment_type}</div>
        <div style="font-size:12px;color:var(--text-muted)">${fmtDate(v.date)}</div>
        ${v.note ? `<div class="note-text">${v.note}</div>` : ''}
      </div>
      <div style="text-align:right">
        <div style="color:var(--accent);font-size:16px">${fmtKr(v.price)}</div>
        <span class="badge ${v.status==='paid'?'badge-paid':'badge-unpaid'}">${v.status==='paid'?'Betald':'Obetald'}</span>
      </div>
    </div>`).join('')}`;
  document.getElementById('modal-customer').classList.add('open');
}

function updateCustomerSuggestions() {
  const names = [...new Set(allTreatments.map(t => t.customer_name))];
  document.getElementById('customer-suggestions').innerHTML = names.map(n => `<option value="${n}">`).join('');
}

// ── EXPENSES ──────────────────────────────────────────────────────
function renderExpenses() {
  const el = document.getElementById('expenses-list');
  if (!allExpenses.length) { el.innerHTML = `<div class="empty"><div class="empty-icon">💸</div><p>Inga utgifter ännu</p></div>`; return; }
  el.innerHTML = allExpenses.map(e => `<div class="expense-item">
    <div>
      <div class="expense-desc">${e.description}</div>
      <div class="expense-meta">${fmtDate(e.date)}${e.paid_to ? ' · ' + e.paid_to : ''}</div>
    </div>
    <div style="display:flex;flex-direction:column;align-items:flex-end;gap:8px">
      <div class="expense-amount">-${fmtKr(e.amount)}</div>
      <button class="btn btn-sm btn-ghost" onclick="deleteExpense('${e.id}',event)" style="color:var(--danger);border-color:rgba(224,92,92,0.3)">✕</button>
    </div>
  </div>`).join('');
}

// ── SAVE ──────────────────────────────────────────────────────────
async function saveTreatment() {
  const typeEl = document.getElementById('t-type');
  const type = typeEl.value === 'custom' ? document.getElementById('t-type-custom').value : typeEl.value;
  const customer = document.getElementById('t-customer').value.trim();
  const phone = document.getElementById('t-phone').value.trim();
  const price = document.getElementById('t-price').value;
  const date = document.getElementById('t-date').value;
  const payment = document.getElementById('t-payment').value;
  const note = document.getElementById('t-note').value.trim();
  if (!customer || !type || !price || !date) { showToast('Fyll i alla obligatoriska fält'); return; }
  const { error } = await db.from('treatments').insert({
    customer_name: customer, customer_phone: phone || null,
    treatment_type: type, price: Number(price), date,
    payment_method: payment || null, status: payment ? 'paid' : 'unpaid', note: note || null
  });
  if (error) { showToast('Fel: ' + error.message); return; }
  showToast('Behandling sparad ✓');
  closeModals(); resetTreatmentForm(); await loadAll();
}

async function saveExpense() {
  const desc = document.getElementById('e-desc').value.trim();
  const amount = document.getElementById('e-amount').value;
  const date = document.getElementById('e-date').value;
  const to = document.getElementById('e-to').value.trim();
  if (!desc || !amount || !date) { showToast('Fyll i alla obligatoriska fält'); return; }
  const { error } = await db.from('expenses').insert({ description: desc, amount: Number(amount), date, paid_to: to || null });
  if (error) { showToast('Fel: ' + error.message); return; }
  showToast('Utgift sparad ✓');
  closeModals(); resetExpenseForm(); await loadAll();
}

async function markPaid(id, event) {
  event.stopPropagation();
  const payment = prompt('Betalmetod:', 'Swish');
  if (!payment) return;
  await db.from('treatments').update({ status: 'paid', payment_method: payment }).eq('id', id);
  await loadAll();
}

async function deleteTreatment(id, event) {
  event.stopPropagation();
  if (!confirm('Radera behandling?')) return;
  await db.from('treatments').delete().eq('id', id);
  await loadAll();
}

async function deleteExpense(id, event) {
  event.stopPropagation();
  if (!confirm('Radera utgift?')) return;
  await db.from('expenses').delete().eq('id', id);
  await loadAll();
}

// ── EXPORT CSV ────────────────────────────────────────────────────
function exportCSV(type) {
  let rows, filename, headers;
  if (type === 'treatments') {
    headers = ['Datum','Kund','Telefon','Behandling','Pris','Betalmetod','Status','Anteckning'];
    rows = allTreatments.map(t => [t.date, t.customer_name, t.customer_phone||'', t.treatment_type, t.price, t.payment_method||'', t.status, (t.note||'').replace(/,/g,'')]);
    filename = 'salona-behandlingar.csv';
  } else {
    headers = ['Datum','Beskrivning','Belopp','Betalt till'];
    rows = allExpenses.map(e => [e.date, e.description, e.amount, e.paid_to||'']);
    filename = 'salona-utgifter.csv';
  }
  const csv = [headers, ...rows].map(r => r.join(',')).join('\n');
  const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename; a.click();
  URL.revokeObjectURL(url);
  showToast('Exporterad ✓');
}

// ── UI ────────────────────────────────────────────────────────────
function showPage(page) {
  currentPage = page;
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('page-' + page).classList.add('active');
  document.querySelectorAll('.tab')[['overview','treatments','customers','expenses'].indexOf(page)].classList.add('active');
}

function openAddModal() {
  document.getElementById(currentPage === 'expenses' ? 'modal-expense' : 'modal-treatment').classList.add('open');
}

function closeModals() {
  document.querySelectorAll('.modal-overlay').forEach(m => m.classList.remove('open'));
}

document.querySelectorAll('.modal-overlay').forEach(o => o.addEventListener('click', e => { if (e.target === o) closeModals(); }));
document.getElementById('t-type').addEventListener('change', function() {
  document.getElementById('t-type-custom-group').style.display = this.value === 'custom' ? 'block' : 'none';
});

function setDefaultDates() {
  const today = new Date().toISOString().split('T')[0];
  document.getElementById('t-date').value = today;
  document.getElementById('e-date').value = today;
}

function resetTreatmentForm() {
  ['t-customer','t-phone','t-price','t-note'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('t-type').value = '';
  document.getElementById('t-payment').value = '';
  setDefaultDates();
}

function resetExpenseForm() {
  ['e-desc','e-amount','e-to'].forEach(id => document.getElementById(id).value = '');
  setDefaultDates();
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function fmtKr(n) { return Math.round(n).toLocaleString('sv-SE') + ' kr'; }
function fmtDate(d) { if (!d) return ''; return new Date(d).toLocaleDateString('sv-SE', { day: 'numeric', month: 'short' }); }
</script>
